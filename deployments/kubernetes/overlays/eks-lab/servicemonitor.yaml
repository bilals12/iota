# Requires Prometheus Operator (e.g. kube-prometheus-stack).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: iota
  namespace: security
  labels:
    app: iota
    app.kubernetes.io/name: iota
spec:
  selector:
    matchLabels:
      app: iota
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 30s
      scheme: http
