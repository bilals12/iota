# Exposes health + Prometheus metrics (same port); ServiceMonitor lives in env overlays when Prometheus Operator exists.
apiVersion: v1
kind: Service
metadata:
  name: iota
  namespace: security
  labels:
    app: iota
    app.kubernetes.io/name: iota
spec:
  selector:
    app: iota
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
